  - id: kehuan
    labels:
      zh-CN: 科幻
    facets:
      market_track: 科幻赛道
      world_tone: 基于科学理论或未来科技魔改，分硬科幻和软科幻两大方向，多为星际争霸、未来都市、时空冒险背景，有明确的科技等级 / 文明层级划分
      theme_agent_key: scifi
      search_blob: 科幻 星际 赛博 时空
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「技术限制、组织博弈、生存代价、文明风险」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「技术突破、危机推演成功、文明跃迁」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「技术突破、危机推演成功、文明跃迁」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以科幻的「技术变量」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「基于科学理论或未来科技魔改，分硬科幻和软科幻两大方向，多为星际争霸、未来都市、时空冒险背景，有明确的科技等级 / 文明层级划分」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现科学共同体、组织权力、文明立场、AI或异族之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「科幻」大类和「科幻赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕科学共同体、组织权力、文明立场、AI或异族建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：科技不能写成万能法术，概念解释不能替代行动。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。

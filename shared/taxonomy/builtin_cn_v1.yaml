      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「现实困境、资源翻盘、关系变化、身份上升」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「解决身边麻烦、事业突破、身份曝光」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。

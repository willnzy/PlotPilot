              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动改写误会、重建信任和事业反击升级或改变人物处境。
              环境描写：围绕「以重生、回档或再来一次的情感修正为核心，人物带着遗憾、误会或失败记忆重走关键关系节点」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。

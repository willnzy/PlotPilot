    facets:
      market_track: 灵异惊悚赛道
      world_tone: 中式民俗 / 鬼神体系，多为现代都市 / 乡村背景，结合民间传说、风水玄学设定，分惊悚恐怖流和灵异日常流两大分支
      theme_agent_key: suspense
      search_blob: 灵异 民俗 风水 鬼怪
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「禁忌触发、规则试探、生路寻找、因果揭底」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「躲过禁忌、破除局部诡事、驱邪定局」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「躲过禁忌、破除局部诡事、驱邪定局」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。

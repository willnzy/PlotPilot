              环境描写：围绕「异世界转生保留 RPG 式成长、种族文化和冒险版图，但会强化前世认知差、第二人生与命运重开体验」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。
              人物对话：让角色围绕同伴、社团、同学、异世界伙伴和反差角色里的利益、恐惧、亲密距离或立场冲突说话；同一场对话至少暴露一个目标、筹码或隐瞒信息。
            special_requirements: |-
              题材承诺：所有关键桥段必须同时兑现大类主要回报、主题世界观基调和「二次元轻小说赛道」期待，不能只套通用爽点。
              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。
              人物要求：围绕同伴、社团、同学、异世界伙伴和反差角色建立阻力与回报，至少保留一个能长期施压、也能被阶段性反超的对照人物。
              禁忌：梗和吐槽要服务人物，不能堆网络段子破坏沉浸；同时避免设定只停留在背景介绍，必须进入行动、选择和后果。
              题材细则：每次出现异世界转生保留 RPG 式成长、种族文化和冒险版图、适应新世界、结识伙伴和成长冒险相关要素，都要在后续转化为一次破局、反噬、误导或情绪兑现。

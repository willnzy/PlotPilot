  - id: tongren
    labels:
      zh-CN: 同人
    facets:
      market_track: 同人衍生赛道
      world_tone: 基于原作世界观进行二次创作，严格贴合原作核心设定，分剧情衍生、平行世界、CP 向创作三大方向，核心受众为原作粉丝群体
      theme_agent_key: other
      search_blob: 同人 衍生 CP 原作
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「原作节点、新变量、角色关系、剧情偏移」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「角色认可、名场面参与、意难平补完」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「角色认可、名场面参与、意难平补完」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以同人的「原作改写」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「基于原作世界观进行二次创作，严格贴合原作核心设定，分剧情衍生、平行世界、CP 向创作三大方向，核心受众为原作粉丝群体」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现原作主角团、反派、CP关系、粉丝熟悉阵营之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「同人」大类和「同人衍生赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕原作主角团、反派、CP关系、粉丝熟悉阵营建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：新增角色不能压扁原角色，关键设定和声线不能随意背离。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。

              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。
              人物要求：围绕恋人、家族、职场、朋友、情敌和现实阻力建立阻力与回报，至少保留一个能长期施压、也能被阶段性反超的对照人物。
              禁忌：主角不能只被动等待拯救，情感标签必须兑现对应情绪；同时避免设定只停留在背景介绍，必须进入行动、选择和后果。
              题材细则：每次出现以重生、回档或再来一次的情感修正为核心、改写误会、重建信任和事业反击相关要素，都要在后续转化为一次破局、反噬、误导或情绪兑现。

            special_requirements: |-
              题材承诺：所有关键桥段必须同时兑现大类主要回报、主题世界观基调和「都市全品类赛道（男女频核心赛道）」期待，不能只套通用爽点。
              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。

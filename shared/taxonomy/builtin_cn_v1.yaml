# PlotPilot 内置 taxonomy — 以本 YAML 为权威源；勿手改 frontend 下的 bundle.json
# 修改后执行: npm run sync:taxonomy（dev/build 前会自动跑）
schema_kind: plotpilot.taxonomy_bundle
schema_version: 1
id: builtin_cn_v1
locale: zh-CN
domain: webnovel_market_cn
title: 中文网文大类 / 主题 / 赛道
description: 通用节点树：父级挂 facets（可变维度键）；子节点仅语义标签；引擎路由用 facets.theme_agent_key。
facet_keys_semantics:
  market_track: 平台常用赛道简述（可作提示词补强）
  world_tone: 世界观基调正文（写入 world_preset；优先使用子主题配置）
  writing_profile: 结构化写作规则对象，固定包含 story_structure / pacing_control / writing_style
    / special_requirements；子主题必须完整覆盖四项，内容以多行分项展示，避免只继承父级导致同质化
  theme_agent_key: 与 Theme Agent registry 对齐的体裁键
  search_blob: 供前端本地模糊搜索的合成串（可选冗余）
roots:
  - id: xuanhuan
    labels:
      zh-CN: 玄幻
    facets:
      market_track: 男频核心爽文主赛道
      world_tone: 东方修真 / 异能体系，强者为尊，以升级流为核心，多为架空大世界，有明确的境界等级划分，核心脉络为逆天改命、登顶世界之巅
      theme_agent_key: xuanhuan
      search_blob: 玄幻 修真 异能 境界 升级
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「受压、夺资源、破阶、见更高层」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「境界突破、越阶胜利、身份揭露」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「境界突破、越阶胜利、身份揭露」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以玄幻的「升级爽文」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「东方修真 / 异能体系，强者为尊，以升级流为核心，多为架空大世界，有明确的境界等级划分，核心脉络为逆天改命、登顶世界之巅」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现师门、宗族、宿敌、上位者压迫和同辈竞争之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「玄幻」大类和「男频核心爽文主赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕师门、宗族、宿敌、上位者压迫和同辈竞争建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：境界不能只换名字，必须写出战力差、资源差和代价差。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。
    children:
      - id: xuanhuan.dongfang
        labels:
          zh-CN: 东方玄幻
        facets:
          world_tone: 东方宗门、王朝、血脉与秘境体系并行，强调传承争夺、家族荣辱与逆天登阶，力量秩序森严且具中式神话质感。
          writing_profile:
            story_structure: |-
              开篇：从宗门、家族或王朝压制切入，第一屏必须亮出主角的具体处境、可争夺对象和第一层阻力。
              发展：围绕传承争夺、秘境历练与势力晋阶推进，每一轮都要让规则认知、人物关系、资源盘面或行动代价至少一项发生可见变化。
              高潮：把跨阶反杀或身世揭露写成前面选择、资源、关系和伏笔共同挤压后的结果，用具体场景动作完成胜负、反转或情绪兑现。
              结尾：抛出更高宗门或上界矛盾。
            pacing_control: |-
              小爽点：放在主角通过一次选择或行动解决近身麻烦、拿到局部线索或资源、识破一层限制、得到明确情绪反馈时。
              中爽点：当传承争夺、秘境历练与势力晋阶完成一轮小闭环，人物位置、阵营关系、资源规模或规则认知出现可见变化时触发。
              大爽点：集中放在跨阶反杀或身世揭露，必须回收前面铺过的选择、伏笔、关系压力和代价。
              节奏原则：按「具体压力落场 → 主角做出选择 → 回报立刻可见 → 新代价抬高」推进；每轮压力都要来自东方宗门、王朝、血脉与秘境体系并行、传承争夺、秘境历练与势力晋阶，不能只用分类名概括。
            writing_style: |-
              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动传承争夺、秘境历练与势力晋阶或改变人物处境。
              环境描写：围绕「东方宗门、王朝、血脉与秘境体系并行，强调传承争夺、家族荣辱与逆天登阶，力量秩序森严且具中式神话质感」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。
              人物对话：让角色围绕师门、宗族、宿敌、上位者压迫和同辈竞争里的利益、恐惧、亲密距离或立场冲突说话；同一场对话至少暴露一个目标、筹码或隐瞒信息。
            special_requirements: |-
              题材承诺：所有关键桥段必须同时兑现大类主要回报、主题世界观基调和「男频核心爽文主赛道」期待，不能只套通用爽点。
              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。
              人物要求：围绕师门、宗族、宿敌、上位者压迫和同辈竞争建立阻力与回报，至少保留一个能长期施压、也能被阶段性反超的对照人物。
              禁忌：境界不能只换名字，必须写出战力差、资源差和代价差；同时避免设定只停留在背景介绍，必须进入行动、选择和后果。
              题材细则：每次出现东方宗门、王朝、血脉与秘境体系并行、传承争夺、秘境历练与势力晋阶相关要素，都要在后续转化为一次破局、反噬、误导或情绪兑现。

          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「解决身边麻烦、事业突破、身份曝光」的正面兑现处，必须让读者看到前期选择和积累的回报。

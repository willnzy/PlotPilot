          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「识破谎言、嫌疑反转、真凶揭露」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以悬疑的「谜题回收」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「多基于现实社会搭建，以强逻辑推理为核心，分刑侦破案流、民间诡案流、悬疑脑洞反转流三大方向，氛围紧张，强剧情反转，节奏紧凑」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现侦查者、嫌疑人、受害者、隐瞒者和利益关联者之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「悬疑」大类和「悬疑刑侦赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕侦查者、嫌疑人、受害者、隐瞒者和利益关联者建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：关键真相必须提前埋线，不能靠结尾空降解释。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。
    children:
      - id: xuanyi.zhentan
        labels:
          zh-CN: 侦探推理
        facets:
          world_tone: 逻辑推理、现场勘查、证据链和推理演绎是核心驱动力，案件世界规则清楚，重点在智力对抗而非超自然。
          writing_profile:
            story_structure: |-
              开篇：从命案、失踪或密室谜题切入，第一屏必须亮出主角的具体处境、可争夺对象和第一层阻力。
              发展：围绕取证、误导和锁定嫌疑人推进，每一轮都要让规则认知、人物关系、资源盘面或行动代价至少一项发生可见变化。
              高潮：把推理闭环与真凶对峙写成前面选择、资源、关系和伏笔共同挤压后的结果，用具体场景动作完成胜负、反转或情绪兑现。
              结尾：留下更大案件网络。
            pacing_control: |-
              小爽点：放在主角通过一次选择或行动解决近身麻烦、拿到局部线索或资源、识破一层限制、得到明确情绪反馈时。
              中爽点：当取证、误导和锁定嫌疑人完成一轮小闭环，人物位置、阵营关系、资源规模或规则认知出现可见变化时触发。
              大爽点：集中放在推理闭环与真凶对峙，必须回收前面铺过的选择、伏笔、关系压力和代价。
              节奏原则：按「具体压力落场 → 主角做出选择 → 回报立刻可见 → 新代价抬高」推进；每轮压力都要来自逻辑推理、现场勘查、证据链和推理演绎是核心驱动力、取证、误导和锁定嫌疑人升级，不能只用分类名概括。
            writing_style: |-
              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动取证、误导和锁定嫌疑人升级或改变人物处境。

  - id: xianxia
    labels:
      zh-CN: 仙侠
    facets:
      market_track: 男频核心仙侠主赛道
      world_tone: 东方修仙体系，以三界六道、天道法则为核心框架，有明确的修仙境界划分，核心脉络为逆天改命、长生问道、勘破天道
      theme_agent_key: xianxia
      search_blob: 仙侠 修仙 修真 天道
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「因果牵引、资源争夺、境界突破、道心考验」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「突破、传承、渡劫、逆命」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「突破、传承、渡劫、逆命」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。

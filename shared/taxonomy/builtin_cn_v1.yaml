  - id: lishi
    labels:
      zh-CN: 历史
    facets:
      market_track: 历史文赛道
      world_tone: 基于真实历史朝代改编或完全架空历史背景，分考据流和爽文流两大方向，核心围绕权谋、争霸、种田、改变历史走向展开
      theme_agent_key: history
      search_blob: 历史 架空 争霸 权谋
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「时代压力、制度缝隙、班底经营、关键节点改写」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「升官、发财、改局、扩张」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「升官、发财、改局、扩张」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以历史的「时代破局」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「基于真实历史朝代改编或完全架空历史背景，分考据流和爽文流两大方向，核心围绕权谋、争霸、种田、改变历史走向展开」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现君臣、宗族、士绅、军队、婚姻和门第之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「历史」大类和「历史文赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。

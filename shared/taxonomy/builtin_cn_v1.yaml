              高潮：把决定性战场表现写成前面选择、资源、关系和伏笔共同挤压后的结果，用具体场景动作完成胜负、反转或情绪兑现。
              结尾：留下更大历史进程。
            pacing_control: |-
              小爽点：放在主角通过一次选择或行动解决近身麻烦、拿到局部线索或资源、识破一层限制、得到明确情绪反馈时。
              中爽点：当立功、调度、结盟和战役完成一轮小闭环，人物位置、阵营关系、资源规模或规则认知出现可见变化时触发。
              大爽点：集中放在决定性战场表现，必须回收前面铺过的选择、伏笔、关系压力和代价。
              节奏原则：按「具体压力落场 → 主角做出选择 → 回报立刻可见 → 新代价抬高」推进；每轮压力都要来自以真实历史战争或军队体制为基础、立功、调度、结盟和战役升级，不能只用分类名概括。
            writing_style: |-
              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动立功、调度、结盟和战役升级或改变人物处境。
              环境描写：围绕「以真实历史战争或军队体制为基础，强调时代限制、兵员来源、后勤条件和战略环境」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。
              人物对话：让角色围绕上下级、战友、敌我阵营、情报线和后勤线里的利益、恐惧、亲密距离或立场冲突说话；同一场对话至少暴露一个目标、筹码或隐瞒信息。
            special_requirements: |-
              题材承诺：所有关键桥段必须同时兑现大类主要回报、主题世界观基调和「男频硬核军武核心赛道（写实 / 架空）」期待，不能只套通用爽点。
              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。
              人物要求：围绕上下级、战友、敌我阵营、情报线和后勤线建立阻力与回报，至少保留一个能长期施压、也能被阶段性反超的对照人物。
              禁忌：热血不能替代战术，军制、武器和行动逻辑要可信；同时避免设定只停留在背景介绍，必须进入行动、选择和后果。
              题材细则：每次出现以真实历史战争或军队体制为基础、立功、调度、结盟和战役相关要素，都要在后续转化为一次破局、反噬、误导或情绪兑现。

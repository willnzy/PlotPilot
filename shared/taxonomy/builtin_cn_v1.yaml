              中爽点：当机械升级、城市阴谋和势力渗透完成一轮小闭环，人物位置、阵营关系、资源规模或规则认知出现可见变化时触发。
              大爽点：集中放在机械战争或能源秘密爆发，必须回收前面铺过的选择、伏笔、关系压力和代价。
              节奏原则：按「具体压力落场 → 主角做出选择 → 回报立刻可见 → 新代价抬高」推进；每轮压力都要来自蒸汽机械、齿轮工业、贵族资本和超凡技术并行、机械改造、城市阴谋和势力渗透，不能只用分类名概括。
            writing_style: |-
              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动机械改造、城市阴谋和势力渗透或改变人物处境。
              环境描写：围绕「蒸汽机械、齿轮工业、贵族资本和超凡技术并行，城市雾霾与阶级鸿沟显著，冲突来自工业革命、技术垄断和旧神秘残响」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。
              人物对话：让角色围绕队友、导师、王权、教会、异族和敌对阵营里的利益、恐惧、亲密距离或立场冲突说话；同一场对话至少暴露一个目标、筹码或隐瞒信息。
            special_requirements: |-
              题材承诺：所有关键桥段必须同时兑现大类主要回报、主题世界观基调和「西幻 / 泛幻想赛道」期待，不能只套通用爽点。
              冲突要求：核心设定必须改变主角能做什么、不能做什么、通过什么拿资源、需要付出什么代价。
              人物要求：围绕队友、导师、王权、教会、异族和敌对阵营建立阻力与回报，至少保留一个能长期施压、也能被阶段性反超的对照人物。
              禁忌：魔法和种族规则不能随手改，队友不能都变成主角挂件；同时避免设定只停留在背景介绍，必须进入行动、选择和后果。
              题材细则：每次出现蒸汽机械、齿轮工业、贵族资本和超凡技术并行、机械升级、城市阴谋和势力渗透相关要素，都要在后续转化为一次破局、反噬、误导或情绪兑现。
  - id: wuxia
    labels:
      zh-CN: 武侠
    facets:
      market_track: 国风武侠赛道
      world_tone: 中式江湖 / 武林体系，有明确的门派 / 武功等级，分传统低武、近代国术、现代高武三大分支，核心围绕家国江湖、侠义恩仇展开
      theme_agent_key: wuxia
      search_blob: 武侠 江湖 门派 国术
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「恩怨牵引、名声变化、人情选择、武力对抗」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「招式精进、旧案反转、江湖扬名」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「招式精进、旧案反转、江湖扬名」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以武侠的「江湖因果」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「中式江湖 / 武林体系，有明确的门派 / 武功等级，分传统低武、近代国术、现代高武三大分支，核心围绕家国江湖、侠义恩仇展开」选择最能制造压迫、机会或情绪的场景细节。

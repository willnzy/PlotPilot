        金手指设定，核心围绕战场博弈、军工崛起、阵营争霸、绝境求生展开，强热血感与爽点密度
      theme_agent_key: history
      search_blob: 军事 军旅 谍战 战争
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「任务目标、情报差、装备协同、战场代价」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「训练突破、战术识破、关键战役胜利」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「训练突破、战术识破、关键战役胜利」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以军事的「任务战术」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「写实流：严格贴合真实军制、军备参数、战场逻辑，强专业性，多基于现实军旅、真实历史战争背景，核心围绕军人成长、保家卫国、家国大义展开。架空流：基于历史 / 现代 / 未来背景魔改，涵盖冷兵器战争、近代抗战、现代反恐、未来星际战争等全维度场景，可搭配系统 / 金手指设定，核心围绕战场博弈、军工崛起、阵营争霸、绝境求生展开，强热血感与爽点密度」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现上下级、战友、敌我阵营、情报线和后勤线之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「军事」大类和「男频硬核军武核心赛道（写实 / 架空）」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕上下级、战友、敌我阵营、情报线和后勤线建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：热血不能替代战术，军制、武器和行动逻辑要可信。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。

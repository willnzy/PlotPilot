          人物要求：围绕师承、恩义、帮会、知己、宿敌和朝廷江湖边界建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：不能把武侠写成单纯升级打怪，名声、人情和侠义选择必须产生后果。

    facets:
      market_track: 末世生存赛道
      world_tone: 文明崩塌后的废土世界，多为丧尸 / 异兽 / 天灾等灾变背景，核心围绕生存、囤货、基地建设、人类文明重建展开，氛围紧张，生存感拉满
      theme_agent_key: scifi

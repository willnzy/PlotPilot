    facets:
      market_track: 西幻 / 泛幻想赛道
      world_tone: 西式魔法 / 神话体系，多为中世纪背景或现代魔改世界观，有明确的职业 / 魔法等级，以阵营对抗、冒险成长为核心主线
      theme_agent_key: fantasy
      search_blob: 奇幻 西幻 剑与魔法
      writing_profile:
        story_structure: |-
          开篇：用最有识别度的具体处境切入，让主角目标、可争夺对象和第一层阻力同时出现。
          发展：按「任务推进、队伍磨合、规则代价、阵营冲突」推进，每一轮都要扩大资源、关系、规则认知或行动代价。
          高潮：集中兑现「技能解锁、队友配合、阵营反转」，把前文铺垫转化成明确胜负、身份变化或情绪爆点。
          结尾：收束本阶段问题，同时抛出更高层目标、敌人、地图、关系债或规则裂口。
        pacing_control: |-
          小爽点：放在主角解决近身麻烦、获得局部资源、识破一层限制或得到一次明确情绪反馈时。
          中爽点：放在一组事件闭环后，让人物地位、关系格局、资源盘面或规则认知发生可见变化。
          大爽点：落在「技能解锁、队友配合、阵营反转」的正面兑现处，必须让读者看到前期选择和积累的回报。
          节奏原则：按「压力落到具体场景 → 行动破局 → 收益可见 → 更大问题露头」推进，不用分类名代替真实矛盾。
        writing_style: |-
          叙事：以奇幻的「冒险探索」为主轴，先写行动、冲突和结果，再补必要设定。
          环境描写：围绕「西式魔法 / 神话体系，多为中世纪背景或现代魔改世界观，有明确的职业 / 魔法等级，以阵营对抗、冒险成长为核心主线」选择最能制造压迫、机会或情绪的场景细节。
          人物对话：体现队友、导师、王权、教会、异族和敌对阵营之间的身份差、利益差和情绪差，避免所有人只替主角解释设定。
        special_requirements: |-
          题材承诺：必须兑现「奇幻」大类和「西幻 / 泛幻想赛道」赛道的核心期待，不能只贴分类标签或复述题材名或复述题材名。
          冲突要求：每个重要设定都要转化为资源争夺、人物选择、关系变化或行动代价。
          人物要求：围绕队友、导师、王权、教会、异族和敌对阵营建立阻力与回报，配角和反派必须有自己的目标。
          禁忌：魔法和种族规则不能随手改，队友不能都变成主角挂件。
          题材细则：每一卷至少让一个制度、资源、关系或场景节点参与最终破局，不能只当氛围陈列。
    children:
      - id: qihuan.lishi
        labels:
          zh-CN: 历史神话
        facets:
          world_tone: 以古代神话、失落王朝和神明谱系为背景，英雄史诗与神权秩序并存，强调传说复苏、神性代价和历史秘密重启。
          writing_profile:
            story_structure: |-
              开篇：从神话遗物、王国旧案或神谕失控切入，第一屏必须亮出主角的具体处境、可争夺对象和第一层阻力。
              发展：围绕史诗任务、神明博弈和古老真相推进，每一轮都要让规则认知、人物关系、资源盘面或行动代价至少一项发生可见变化。
              高潮：把弑神、封神或王朝改命写成前面选择、资源、关系和伏笔共同挤压后的结果，用具体场景动作完成胜负、反转或情绪兑现。
              结尾：抛出更深远的神话债务。
            pacing_control: |-
              小爽点：放在主角通过一次选择或行动解决近身麻烦、拿到局部线索或资源、识破一层限制、得到明确情绪反馈时。
              中爽点：当史诗任务、神明博弈和古老真相完成一轮小闭环，人物位置、阵营关系、资源规模或规则认知出现可见变化时触发。
              大爽点：集中放在弑神、封神或王朝改命，必须回收前面铺过的选择、伏笔、关系压力和代价。
              节奏原则：按「具体压力落场 → 主角做出选择 → 回报立刻可见 → 新代价抬高」推进；每轮压力都要来自以古代神话、失落王朝和神明谱系为背景、史诗任务、神明博弈和古老真相，不能只用分类名概括。
            writing_style: |-
              叙事：先写冲突场景、人物选择和行动结果，再补必要设定；每段说明都要能推动史诗任务、神明博弈和古老真相或改变人物处境。
              环境描写：围绕「以古代神话、失落王朝和神明谱系为背景，英雄史诗与神权秩序并存，强调传说复苏、神性代价和历史秘密重启」挑选物件、空间、制度或氛围细节，让读者看见它们如何制造压迫、机会或代价。
